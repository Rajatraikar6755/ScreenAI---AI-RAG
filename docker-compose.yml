version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: screenai_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: screening_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: screenai_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/knowledge_base:/app/knowledge_base
      - ./backend/chroma_db:/app/chroma_db
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB_NAME: screening_db
      CHROMA_PERSIST_DIR: /app/chroma_db
      KNOWLEDGE_BASE_DIR: /app/knowledge_base
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: screenai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
